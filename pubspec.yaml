name: lifesync_dashboard
version: 1.0.0+1
environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^2.31.0
  cloud_firestore: ^4.17.3
  firebase_auth: ^4.19.5

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Charts
  fl_chart: ^0.68.0

  # State Management
  provider: ^6.1.2

  # UI
  google_fonts: ^6.2.1
  macos_ui: ^2.0.7
  cupertino_icons: ^1.0.8
  shimmer: ^3.0.0
  liquid_progress_indicator_v2: ^1.0.1
  percent_indicator: ^4.2.3

  # Notifications
  flutter_local_notifications: ^17.1.2

  # Utils
  intl: ^0.18.1
  http: ^1.2.1
  path_provider: ^2.1.3
  uuid: ^4.4.0
  flutter_dotenv: ^5.1.0
  equatable: ^2.0.5
  dartz: ^0.10.1
  logger: ^2.3.0
  connectivity_plus: ^6.0.3
  json_annotation: ^4.9.0

  # Platform-specific
  flutter_platform_widgets: ^7.0.1

  # Animations
  animations: ^2.0.11
  flutter_animate: ^4.5.0

  # Adaptive Layout
  flutter_adaptive_scaffold: ^0.1.13
  device_preview: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.10
  json_serializable: ^6.8.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - .env

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  macos:
    generate: true
    image_path: "assets/icon/icon.png"
